name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build with .env file (Firebase base="/")
        if: ${{ vars.VITE_STORAGE_ENGINE == '' || !vars.VITE_STORAGE_ENGINE }}
        run: VITE_BASE_PATH=/ yarn build

      - name: Build with GitHub env vars (Firebase base="/")
        if: ${{ vars.VITE_STORAGE_ENGINE != '' }}
        run: VITE_BASE_PATH=/ VITE_STORAGE_ENGINE=$VITE_STORAGE_ENGINE yarn build
        env:
          VITE_STORAGE_ENGINE: ${{ vars.VITE_STORAGE_ENGINE }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
