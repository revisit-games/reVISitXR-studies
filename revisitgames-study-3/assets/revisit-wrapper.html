<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unity Game Embedded in reVISit</title>
  <script src="../../revisitUtilities/revisit-communicate.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    iframe { border: none; width: 100%; height: 100vh; }
  </style>
</head>
<body>

  <div id="difficulty-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <label for="difficulty-input">Select Difficulty Level (1-5):</label>
    <input type="number" id="difficulty-input" min="1" max="5" value="3" style="margin: 8px; width: 60px;" />
    <button id="confirm-btn">Confirm</button>
  </div>
  <iframe id="unity-iframe" allow="fullscreen" style="display:none;"></iframe>

  <script>

  const iframe = document.getElementById("unity-iframe");
  const difficultyContainer = document.getElementById("difficulty-container");
  const difficultyInput = document.getElementById("difficulty-input");
  const confirmBtn = document.getElementById("confirm-btn");

    // ---------------- helpers ----------------
    function getParamFromHashOrQuery(name) {
      const hashParams = new URLSearchParams(location.hash.slice(1));
      let v = hashParams.get(name);
      if (v == null) {
        // normalize accidental multiple '?'
        const normalized = location.search.replace(/\?(?=.*\?)/g, "&");
        const qs = new URLSearchParams(normalized);
        v = qs.get(name);
        if (v && v.includes("?")) v = v.split("?")[0];
      }
      return v ?? null;
    }
    const toInt = (v) => (v == null ? null : (Number.isFinite(parseInt(v,10)) ? parseInt(v,10) : null));
    const clampDifficulty = (n) => (n!=null && n>=1 && n<=5 ? n : null);
    const clampBinary = (n) => (n===0 || n===1 ? n : null);

    function setIframeSrc(difficultyLevel, isJuicy) {
      // Build/index.html?difficultyLevel=...&isJuicy=...
      const url = new URL("Build/index.html", location.href);
      url.searchParams.set("difficultyLevel", String(difficultyLevel));
      url.searchParams.set("isJuicy", String(isJuicy));
      // keep relative path for iframe src
      iframe.src = url.pathname + url.search;
      console.log("[Wrapper] Using params:", { difficultyLevel, isJuicy, src: iframe.src });
    }


    // ------------- initial values from URL -------------
    const urlJuicy = clampBinary(toInt(getParamFromHashOrQuery("isJuicy")));
    const isJuicy = urlJuicy ?? 0;        // default 0; ONLY from URL/config

    let difficultyLevel = null;

    // Only load iframe after confirm
    confirmBtn.addEventListener("click", function() {
      const inputVal = clampDifficulty(toInt(difficultyInput.value));
      if (inputVal == null) {
        alert("Please enter a difficulty level between 1 and 5.");
        return;
      }
      difficultyLevel = inputVal;
      setIframeSrc(difficultyLevel, isJuicy);
      difficultyContainer.style.display = "none";
      iframe.style.display = "block";
    });


    // ------------- listen for parent payload (for difficulty only) -------------
    // If parent sends a payload, update difficulty and load iframe if not already loaded
    function maybeUpdateFromPayload(p) {
      if (!p || typeof p !== "object") return;
      const fromLevel = clampDifficulty(toInt(p.difficultyLevel));
      const fromPlain = clampDifficulty(toInt(p.difficulty));
      const next = fromLevel ?? fromPlain;
      if (next != null && next !== difficultyLevel) {
        difficultyLevel = next;
        setIframeSrc(difficultyLevel, isJuicy);
        difficultyContainer.style.display = "none";
        iframe.style.display = "block";
      }
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};


      // messages from Unity
      // Level End Events
      if (data.type === "movement_complete") {
        // Array of movement events for the level
        Revisit.postAnswers({ movement_complete: JSON.stringify(data.payload) });
        return;
      }
      if (data.type === "collisons_complete") {
        // Array of collision events for the level
        Revisit.postAnswers({ collisons_complete: JSON.stringify(data.payload) });
        return;
      }
      if (data.type === "summary_complete") {
        // Array of summary data for the level
        Revisit.postAnswers({ summary_complete: JSON.stringify(data.payload) });
        return;
      }

      // Game End Event
      if (data.type === "game_complete") {
        Revisit.postAnswers({ game_complete: JSON.stringify(data.payload) });
        return;
      }

      // messages from reVISit parent
      if (data.type === "revisit:payload" || data.type === "payload" || data.type === "revisit_payload") {
        console.log("[Wrapper] Parent payload:", data.payload);
        maybeUpdateFromPayload(data.payload);
      }
    });

    // Optional convenience if your bridge provides it
    if (typeof Revisit !== "undefined" && typeof Revisit.onPayload === "function") {
      Revisit.onPayload((p) => {
        console.log("[Wrapper] Revisit.onPayload:", p);
        maybeUpdateFromPayload(p);
      });
    }
  </script>
</body>
</html>
